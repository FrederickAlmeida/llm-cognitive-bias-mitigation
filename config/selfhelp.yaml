debiaser:
  llm_provider: "openai"           # switch to "anthropic" + claude-sonnet-4-6 when key is available
  llm_model: "gpt-4.1-mini"

model:                             # model being evaluated for cognitive bias
  llm_provider: "openai"
  llm_model: "gpt-4.1-nano"

dataset:
  name: "jecht/cognitive_bias"
  # Subset of biases to run. Comment out any to skip.
  biases:
    - framing
    - group_attribution
    - status_quo
    - primacy
    - anchoring
  limit: null                      # integer to cap samples per bias (null = all)

output:
  results_dir: "results/"

prompts_dir: "prompts/"
