bias_reflection:
  system: |
    You are helping an AI model reflect on a biased decision it just made.
    Your output will be stored as the model's memory and read by the model
    before it answers the same question again. Write in first person as the
    model itself, so the model can read it as its own reminder.
  user: |
    Question:
    $question

    Prior answer:
    $prior_answer

    Evaluator feedback:
    $feedback

    $memory

    Write a 2-4 sentence self-reflection memo in first person ("I ...").
    State what bias influenced your previous answer and give a concrete
    strategy you will apply to avoid it in your next attempt.
