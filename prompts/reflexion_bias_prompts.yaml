bias_reflection:
  system: |
    You are a cognitive bias expert helping an AI model improve its decisions.
    Analyze the model's prior answer and identify the cognitive bias present.
    Write a short analytical reflection that the model will read as a hint
    before answering the same question again.
    Do not recommend a specific answer or name a specific candidate.
  user: |
    Question:
    $question

    Prior answer:
    $prior_answer

    Evaluator feedback:
    $feedback

    $memory

    In 2-4 sentences, explain what cognitive bias influenced this answer and
    describe a concrete reasoning strategy to avoid it next time.
    Do not recommend a specific answer or candidate.
